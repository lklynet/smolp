<!doctype html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-85LBR0M6FY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "G-85LBR0M6FY");
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>smolp — image optimization</title>
  <meta name="description" content="Optimize images in your browser. Everything happens locally — your files never leave your device. JPEG, PNG, WebP, AVIF." />
  <meta name="theme-color" content="#151515" />
  <meta property="og:title" content="smolp" />
  <meta property="og:description" content="Optimize images in your browser. Everything happens locally — your files never leave your device." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>" />
  <link href="/css/style.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <header id="header">
    <div class="header-inner">
      <div id="logo">smolp</div>
      <button id="dark-toggle" aria-label="Toggle dark mode">
        <span class="toggle-circle"></span>
      </button>
    </div>
  </header>

  <div id="toggle-message">Stop playing with the lights!</div>

  <main id="main">

    <div id="dropzone">
      <div class="drop-inner">
        <svg class="drop-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4m4-5l5-5 5 5m-5-5v12"/>
        </svg>
        <div class="drop-text">
          <label for="file-input">Upload images</label> or drag and drop
        </div>
        <div class="drop-ext">PNG, JPG, GIF, WebP, SVG, AVIF</div>
      </div>
      <input type="file" id="file-input" class="hidden" multiple accept="image/*" />
    </div>

    <div id="image-section" class="hidden">
      <h2>Images</h2>
      <div id="image-list"></div>

      <div id="controls">
        <div class="control-group">
          <label for="format-select">Format</label>
          <select id="format-select">
            <option value="jpeg">JPEG</option>
            <option value="png">PNG</option>
            <option value="webp">WebP</option>
            <option value="avif">AVIF</option>
          </select>
        </div>
        <div class="control-group" id="quality-group">
          <label for="quality-range">Quality</label>
          <input type="range" id="quality-range" min="0.1" max="1" step="0.1" value="0.7" />
          <div class="quality-value" id="quality-value">70%</div>
        </div>
        <button id="btn-process">Process All</button>
      </div>
    </div>
  </main>

  <script src="/scripts.js" defer></script>
</body>
</html>
